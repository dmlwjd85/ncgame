# GitHub Pages — https://사용자명.github.io/저장소이름/
# 이 저장소의 유일한 자동 배포(Firebase Hosting CI는 사용하지 않음).
#
# 처음 한 번: 저장소 Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 의존성 설치 및 빌드 (저장소 이름 기준 하위 경로)
        run: npm ci && npm run build
        env:
          # 저장소 ncgame → base /ncgame/ (Vite 자산·라우터 경로)
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # GitHub Pages + Actions 배포에 필요 (OIDC / Pages 설정)
      - uses: actions/configure-pages@v5

      # SPA: /ncgame/login 등 직접 URL 접속 시에도 index 로 폴백
      - name: SPA용 404.html 생성
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
