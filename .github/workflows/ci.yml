# 모든 브랜치 푸시·PR에서 빌드 — Actions 탭에 실행 기록이 쌓이도록 함
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 설치 및 빌드
        run: npm ci && npm run build
        env:
          VITE_BASE_PATH: /
